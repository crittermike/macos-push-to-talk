name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build app
        run: ./build-app.sh

      - name: Zip app bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ -z "$VERSION" ] && VERSION="dev"
          ZIP="PushToTalk-${VERSION}.zip"
          ditto -c -k --sequesterRsrc --keepParent "Push To Talk.app" "$ZIP"
          shasum -a 256 "$ZIP" > "$ZIP.sha256"
          echo "ZIP=$ZIP" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PushToTalk-app
          path: |
            ${{ env.ZIP }}
            ${{ env.ZIP }}.sha256

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ZIP }}
            ${{ env.ZIP }}.sha256
          generate_release_notes: true
